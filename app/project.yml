name: GermanAnki
options:
  bundleIdPrefix: com.dani
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 6.29.0
settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1"
targets:
  GermanAnki:
    type: application
    platform: iOS
    sources:
      - path: GermanAnki
      - path: ../data/app/content.sqlite
        buildPhase: resources
      - path: ../data/app/audio
        type: folder
        buildPhase: resources
    dependencies:
      - package: GRDB
    info:
      path: GermanAnki/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
  GermanAnkiTests:
    type: bundle.unit-test
    platform: iOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - path: GermanAnkiTests
    dependencies:
      - target: GermanAnki
  GermanAnkiUITests:
    type: bundle.ui-testing
    platform: iOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - path: GermanAnkiUITests
    dependencies:
      - target: GermanAnki
schemes:
  GermanAnki:
    build:
      targets:
        GermanAnki: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - GermanAnkiTests
        - GermanAnkiUITests
